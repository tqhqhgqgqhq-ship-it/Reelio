name: Android Build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug info
        run: |
          echo "--- java version ---"
          java -version || true
          echo "\n--- gradle wrapper properties ---"
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then cat gradle/wrapper/gradle-wrapper.properties; else echo "no gradle-wrapper.properties"; fi
          echo "\n--- list gradle wrapper dir ---"
          ls -la gradle/wrapper || true
          echo "\n--- ./gradlew --version ---"
          ./gradlew --version || true

      - name: Build with Gradle action
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Reelio-APK
          path: app/build/outputs/apk/debug/app-debug.apk
